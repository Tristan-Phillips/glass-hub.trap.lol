<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trap.lol // uplink</title>
    <link rel="stylesheet" href="glass/style/style.css" />
  </head>
  <body>
    <div id="cmd-overlay" class="cmd-overlay hidden">
      <span id="cmd-text"></span><span class="cursor">_</span>
    </div>

    <header>
      <div id="header-eyebrow" class="header__eyebrow"></div>
      <h1 id="header-title" class="header__title" data-text=""></h1>
      <p id="header-subtitle" class="header__subtitle"></p>
    </header>

    <main>
      <section id="hosting-section">
        <h2 class="section-title">
          <i data-lucide="server"></i> Sovereign Nodes
        </h2>
        <div id="hosting-grid" class="grid-primary"></div>
      </section>

      <section id="bots-section">
        <h2 class="section-title"><i data-lucide="network"></i> Drone Fleet</h2>
        <div id="bots-container" class="bots-grid"></div>
      </section>

      <section id="extlinks-section">
        <h2 class="section-title">
          <i data-lucide="globe"></i> Signal Mesh
          <span class="hint">[Type Shortcut to Navigate]</span>
        </h2>
        <div id="extlinks-container" class="ext-container"></div>
      </section>

      <section id="guides-section">
        <h2 class="section-title">
          <i data-lucide="book-open"></i> Sacred Codex
        </h2>
        <div id="guides-carousel" class="carousel"></div>
      </section>
    </main>

    <section id="tools-section">
      <h2 class="section-title">
        <i data-lucide="terminal-square"></i> Ordnance Depot
      </h2>
      <div id="tools-container" class="tools-grid"></div>
    </section>

    <script src="glass/script/app.js"></script>
  </body>
</html>
